name: Refresh fuel prices

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch latest prices
        env:
          TANKERKOENIG_API_KEY: ${{ secrets.TANKERKOENIG_API_KEY }}
        run: python fetch_prices.py
      - name: Commit updated data
        run: |
          git config user.name "fuelgrid-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/prices-latest.json
          git commit -m "Weekly price refresh" || echo "No changes"
          git push
